user_visible_outputs = ["/app/output/raw.json", "/app/output/report.json", "/app/tools/run_local.sh"]
internal_harness_files = []

[structured_outputs.raw]
target = "/app/output/raw.json"
format = "json"
instruction_checks = ["raw", "case", "produced", "slot_trace", "order_used", "packed", "grouped", "reuse"]

[structured_outputs.report]
target = "/app/output/report.json"
format = "json"
instruction_checks = ["rows", "case", "produced", "slot_trace", "order_used", "packed", "grouped", "reuse", "summary", "total", "agree"]
