user_visible_outputs = ["/app/output/policy-audit.json", "/app/scripts/run-matrix.sh"]
internal_harness_files = [
    "/app/scripts/run-matrix.sh",
    "/app/scripts/run-one.sh",
    "/app/traces/alpha.trace",
    "/app/traces/beta.trace",
    "/app/traces/gamma.trace",
    "/app/traces/delta.trace",
    "/app/traces/epsilon.trace",
    "/app/traces/zeta.trace",
]

[structured_outputs.policy_audit]
target = "/app/output/policy-audit.json"
format = "json"
instruction_checks = [
    "cases",
    "name",
    "ok",
    "decisions",
    "stale",
    "label",
    "principal",
    "resource",
    "action",
    "verdict",
    "epoch",
    "reused",
    "batch_id",
    "delegated_from",
]
