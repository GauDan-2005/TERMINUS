user_visible_outputs = [
  "/app/output/alloc-audit.json",
  "/app/scripts/run-matrix.sh",
  "/app/scripts/run-one.sh",
]

internal_harness_files = [
  "/app/scripts/run-matrix.sh",
  "/app/scripts/run-one.sh",
  "/app/bin/allocctl",
]

[structured_outputs.alloc_audit]
target = "/app/output/alloc-audit.json"
format = "json"
instruction_checks = [
  "cases",
  "steps",
  "seq",
  "op",
  "index",
  "size",
  "result_index",
  "heap_sig",
  "fl_count",
  "fl_sig",
  "byte_total",
  "ledger",
  "ok",
]
