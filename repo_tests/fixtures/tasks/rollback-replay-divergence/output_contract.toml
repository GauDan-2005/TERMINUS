user_visible_outputs = ["/app/output/matrix_report.json", "/app/output/trace_bundle.jsonl"]
internal_harness_files = ["/app/bin/netplay_matrix"]

[structured_outputs.matrix_report]
target = "/app/output/matrix_report.json"
format = "json"
instruction_checks = ["schema_version", "rng_channel_totals", "scenarios"]

[structured_outputs.trace_bundle]
target = "/app/output/trace_bundle.jsonl"
format = "jsonl"
instruction_checks = ["scenario_id", "tick", "entropy_mix"]
