user_visible_outputs = [
  "/app/output/solver-audit.json",
  "/app/scripts/run-matrix.sh",
  "/app/scripts/run-one.sh",
]

internal_harness_files = [
  "/app/build",
  "/app/bin/solverctl",
  "/app/data/cases",
  "/app/scripts/clean-room.sh",
]

[structured_outputs.solver_audit]
target = "/app/output/solver-audit.json"
format = "json"
instruction_checks = [
  "cases",
  "name",
  "ok",
  "iterations",
  "final_residual",
  "reported_residual",
  "residual_agrees",
  "hit_limit",
]
