# Per-scenario schedules for the bundled sweep.
# profile selects the initial-condition table under /app/data/init.
# leaves is a '|'-separated list (one entry per base cell); each entry is a
# comma-separated list of integer sub-cell weights for that base cell.
# do_flux / do_collapse / do_restart toggle the structural phases.

[storm]
profile = 0
n_coarse = 4
do_flux = 1
do_collapse = 0
do_restart = 0
leaves = 2,1,1|1|1|1

[canyon]
profile = 1
n_coarse = 4
do_flux = 1
do_collapse = 0
do_restart = 0
leaves = 2,1,1|2,2|1|1

[plume]
profile = 2
n_coarse = 4
do_flux = 0
do_collapse = 1
do_restart = 0
leaves = 2,1|3,1|1|1

[spire]
profile = 0
n_coarse = 4
do_flux = 0
do_collapse = 1
do_restart = 0
leaves = 3,1|1|1|1

[basin]
profile = 1
n_coarse = 4
do_flux = 1
do_collapse = 0
do_restart = 1
leaves = 2,1,1|1|1|1

[dune]
profile = 2
n_coarse = 4
do_flux = 1
do_collapse = 0
do_restart = 1
leaves = 2,1,1|2,2|1|1
